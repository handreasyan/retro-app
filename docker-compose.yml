services:
  postgres:
    image: postgres:16-alpine
    container_name: retro-postgres
    environment:
      POSTGRES_USER: retro
      POSTGRES_PASSWORD: retro
      POSTGRES_DB: retro
    ports:
      - "5432:5432"
    volumes:
      - retro_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retro -d retro"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  retro_pgdata:
